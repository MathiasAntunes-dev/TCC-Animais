{% extends 'base.html' %}

{% block title %}
Cadastrar Pet - FurryHub
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card pet-form">

        <h1>Cadastrar Pet</h1>

        <p>
            Preencha as informações do animal que procura um novo lar.
        </p>

        <form method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="nome">Nome do Pet</label>

                <input type="text" id="nome" name="nome" placeholder="Ex: Thor" required>
            </div>

            <div class="form-group">
                <label for="idade">Idade</label>

                <input type="number" id="idade" name="idade" min="0" placeholder="Ex: 3" required>
            </div>

            <div class="form-group">
                <label for="especie">Espécie</label>

                <select id="especie" name="especie" required>
                    <option value="">Selecione</option>
                    <option value="Cachorro">🐶 Cachorro</option>
                    <option value="Gato">🐱 Gato</option>
                    <option value="Outro">🐾 Outro</option>
                </select>
            </div>

            <div class="form-group">
                <label for="raca">Raça</label>

                <input type="text" id="raca" name="raca" placeholder="Ex: Labrador">
            </div>

            <div class="form-group">
                <label for="sexo">Sexo</label>

                <select id="sexo" name="sexo" required>
                    <option value="">Selecione</option>
                    <option value="Macho">Macho</option>
                    <option value="Fêmea">Fêmea</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição</label>

                <textarea id="descricao" name="descricao" rows="5" placeholder="Conte um pouco sobre o animal..."
                    required></textarea>
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp para Contato</label>

                <input type="text" id="whatsapp" name="whatsapp" placeholder="Ex: 11999999999" required>
            </div>

            <div class="form-group">
                <label for="foto">Foto do Pet</label>

                <input type="file" id="foto" name="foto" accept="image/*">
            </div>

            <button type="submit" class="btn">
                Publicar Pet
            </button>

        </form>

    </div>

</div>

{% endblock %}
